name: Integración continua

on:
  push:
    branches: [ main ]
    paths: ['hangman-api/**']
  pull_request:
    branches: [ main ]

jobs:
  buildAndTest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Build
        working-directory: ./hangman-api
        run: |
          npm ci
          npm run build
          npm run test